<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<head>
    <title>Responder Pregunta</title>
</head>

<body>
<div layout:fragment="content">
    <div class="card card-accent-top card-accent-dark">
        <div class="card-body p-4">
            <div class="d-flex justify-content-between align-items-start mb-3">
                <div>
                    <span class="badge bg-secondary mb-2" th:text="${pregunta.tipoDescripcion}">Tipo</span>
                    <span class="badge bg-light text-dark ms-1" th:text="${pregunta.tematica.nombre}">Temática</span>
                </div>
            </div>

            <h4 class="fw-bold mb-4" th:text="${pregunta.enunciado}">Enunciado</h4>

            <form th:action="@{/preguntas/responder}" method="post" th:object="${respuesta}">
                <input type="hidden" th:field="*{preguntaId}">

                <!-- VERDADERO / FALSO -->
                <div th:if="${pregunta.getClass().getSimpleName() == 'PreguntaVerdaderoFalso'}" class="mb-4">
                    <label class="fw-medium mb-2">Selecciona una opción:</label>
                    <div class="d-flex gap-3">
                        <div class="form-check">
                            <input class="form-check-input" type="radio" th:field="*{respuesta}" id="vf-true" value="true">
                            <label class="form-check-label fw-medium" for="vf-true">Verdadero</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" th:field="*{respuesta}" id="vf-false" value="false">
                            <label class="form-check-label fw-medium" for="vf-false">Falso</label>
                        </div>
                    </div>
                </div>

                <!-- SELECCIÓN ÚNICA -->
                <div th:if="${pregunta.getClass().getSimpleName() == 'PreguntaSeleccionUnica'}" class="mb-4">
                    <label class="fw-medium mb-2">Selecciona una opción:</label>
                    <div th:each="opc : ${pregunta.opciones}" class="form-check mb-2">
                        <input class="form-check-input" type="radio" th:field="*{respuesta}" th:value="${opc}" th:id="'unica-' + ${opc}">
                        <label class="form-check-label" th:for="'unica-' + ${opc}" th:text="${opc}">Opción</label>
                    </div>
                </div>

                <!-- SELECCIÓN MÚLTIPLE -->
                <div th:if="${pregunta.getClass().getSimpleName() == 'PreguntaSeleccionMultiple'}" class="mb-4">
                    <label class="fw-medium mb-2">Selecciona una o más opciones:</label>
                    <div th:each="opc : ${pregunta.opciones}" class="form-check mb-2">
                        <input class="form-check-input" type="checkbox" th:field="*{respuestas}" th:value="${opc}" th:id="'multi-' + ${opc}">
                        <label class="form-check-label" th:for="'multi-' + ${opc}" th:text="${opc}">Opción</label>
                    </div>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-gradient">Responder</button>
                    <a th:href="@{/preguntas}" class="btn btn-outline-secondary">&larr; Volver</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
