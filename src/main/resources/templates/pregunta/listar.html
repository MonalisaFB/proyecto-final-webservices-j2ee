<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<head>
    <title th:text="${pagina.totalElements > 0 ? 'Listado de Preguntas' : 'Preguntas'}">Listado de Preguntas</title>
</head>

<body>
<div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1>Preguntas</h1>
        <a th:href="@{/preguntas/nueva}" class="btn btn-gradient">+ Nueva Pregunta</a>
    </div>

    <div th:if="${param.success}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${param.success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <form th:action="@{/preguntas}" method="get" class="row g-3 mb-3">
        <div class="col-auto">
            <select name="tematicaId" class="form-select" onchange="this.form.submit()">
                <option value="">Todas las temáticas</option>
                <option th:each="t : ${tematicas}" th:value="${t.id}" th:text="${t.nombre}"
                        th:selected="${tematicaId == t.id}"></option>
            </select>
        </div>
        <div class="col-auto">
            <select name="tipo" class="form-select" onchange="this.form.submit()">
                <option value="">Todos los tipos</option>
                <option th:each="tp : ${tipos}" th:value="${tp}" th:text="${tp}"
                        th:selected="${tipo == tp}"></option>
            </select>
        </div>
        <div class="col-auto">
            <a th:href="@{/preguntas}" class="btn btn-secondary">Limpiar filtros</a>
        </div>
    </form>

    <div th:if="${pagina.totalElements == 0}" class="alert alert-info">
        No hay preguntas registradas.
    </div>

    <div class="card card-table">
        <div class="card-body p-0">
            <table class="table table-striped mb-0" th:if="${pagina.totalElements > 0}">
                <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Enunciado</th>
                    <th>Tipo</th>
                    <th>Temática</th>
                    <th>Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="p : ${pagina.content}">
                    <td th:text="${p.id}">1</td>
                    <td th:text="${p.enunciado}">Enunciado</td>
                    <td th:text="${p.tipoDescripcion}">VF</td>
                    <td th:text="${p.tematica.nombre}">Temática</td>
                    <td>
                        <a th:href="@{/preguntas/responder/{id}(id=${p.id})}" class="btn btn-sm btn-outline-secondary">Responder</a>
                        <a th:href="@{/preguntas/editar/{id}(id=${p.id})}" class="btn btn-sm btn-warning">Editar</a>
                        <a th:href="@{/preguntas/eliminar/{id}(id=${p.id})}" class="btn btn-sm btn-danger"
                           onclick="return confirm('¿Eliminar esta pregunta?')">Eliminar</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <nav th:if="${pagina.totalPages > 1}" aria-label="Paginación">
        <ul class="pagination">
            <li class="page-item" th:classappend="${pagina.first} ? 'disabled'">
                <a class="page-link" th:href="@{/preguntas(page=0, size=${pagina.size}, tematicaId=${tematicaId}, tipo=${tipo})}">&laquo;</a>
            </li>
            <li class="page-item" th:classappend="${pagina.first} ? 'disabled'">
                <a class="page-link" th:href="@{/preguntas(page=${pagina.number - 1}, size=${pagina.size}, tematicaId=${tematicaId}, tipo=${tipo})}">Anterior</a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(0, pagina.totalPages - 1)}"
                th:classappend="${i == pagina.number} ? 'active'">
                <a class="page-link" th:href="@{/preguntas(page=${i}, size=${pagina.size}, tematicaId=${tematicaId}, tipo=${tipo})}" th:text="${i + 1}">1</a>
            </li>
            <li class="page-item" th:classappend="${pagina.last} ? 'disabled'">
                <a class="page-link" th:href="@{/preguntas(page=${pagina.number + 1}, size=${pagina.size}, tematicaId=${tematicaId}, tipo=${tipo})}">Siguiente</a>
            </li>
            <li class="page-item" th:classappend="${pagina.last} ? 'disabled'">
                <a class="page-link" th:href="@{/preguntas(page=${pagina.totalPages - 1}, size=${pagina.size}, tematicaId=${tematicaId}, tipo=${tipo})}">&raquo;</a>
            </li>
        </ul>
    </nav>

    <p th:if="${pagina.totalElements > 0}" class="text-muted">
        Mostrando página <span th:text="${pagina.number + 1}">1</span> de <span th:text="${pagina.totalPages}">1</span>
        (total: <span th:text="${pagina.totalElements}">0</span> preguntas)
    </p>

    <div class="mt-3">
        <a th:href="@{/}" class="btn btn-outline-secondary">&larr; Volver al Inicio</a>
    </div>
</div>
</body>
</html>
