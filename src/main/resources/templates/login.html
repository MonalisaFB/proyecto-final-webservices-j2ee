<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Iniciar sesión - Examen Final</title>
</head>
<body>
<div layout:fragment="content">
    <div class="row justify-content-center mt-5">
        <div class="col-md-5 col-lg-4">
            <div class="card card-accent-top card-accent-dark">
                <div class="card-body p-4">
                    <div class="text-center mb-4">
                        <div style="font-size: 3rem;">🔐</div>
                        <h3 class="fw-bold mt-2">Iniciar sesión</h3>
                    </div>

                    <div th:if="${param.error}" class="alert alert-danger">
                        Credenciales inválidas
                    </div>
                    <div th:if="${param.logout}" class="alert alert-success">
                        Sesión cerrada correctamente
                    </div>

                    <form th:action="@{/login}" method="post">
                        <div class="mb-3">
                            <label for="username" class="form-label fw-medium">Email</label>
                            <input type="email" id="username" name="username" class="form-control form-control-lg" required autofocus>
                        </div>
                        <div class="mb-4">
                            <label for="password" class="form-label fw-medium">Contraseña</label>
                            <input type="password" id="password" name="password" class="form-control form-control-lg" required>
                        </div>
                        <button type="submit" class="btn btn-gradient w-100 py-2">Entrar</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
