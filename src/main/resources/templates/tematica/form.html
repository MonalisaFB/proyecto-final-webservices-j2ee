<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<head>
    <title th:text="${tematica.id != null ? 'Editar Temática' : 'Nueva Temática'}">Formulario Temática</title>
</head>

<body>
<div layout:fragment="content">
    <h1 th:text="${tematica.id != null ? 'Editar Temática' : 'Nueva Temática'}">Formulario</h1>

    <form th:action="@{/tematicas/guardar}" th:object="${tematica}" method="post" class="mt-3">
        <input type="hidden" th:field="*{id}">

        <div class="mb-3">
            <label for="nombre" class="form-label">Nombre</label>
            <input type="text" th:field="*{nombre}" class="form-control" id="nombre" placeholder="Nombre de la temática">
            <div class="text-danger" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></div>
        </div>

        <button type="submit" class="btn btn-primary">Guardar</button>
        <a th:href="@{/tematicas}" class="btn btn-secondary">&larr; Volver</a>
        <a th:href="@{/}" class="btn btn-outline-primary">Inicio</a>
    </form>
</div>
</body>
</html>
